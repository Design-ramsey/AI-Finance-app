<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Finance App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
        /* CSS Variables for theming */
        :root {
            --primary-color: #6200ea;
            --secondary-color: #03dac6;
            --background-color: #ffffff;
            --text-color: #000000;
            --dark-background-color: #121212;
            --dark-text-color: #ffffff;
        }
        /* Basic styles */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        /* Dark mode styles */
        body.dark {
            background-color: var(--dark-background-color);
            color: var(--dark-text-color);
        }
        /* Button styles with hover effects */
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:hover {
            background-color: var(--secondary-color);
            transform: scale(1.05);
        }
        /* Accessibility enhancements */
        [aria-hidden="true"] {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to AI Finance App</h1>
    </header>
    <main>
        <section>
            <h2>Features</h2>
            <p>Explore our advanced finance tools.</p>
            <button aria-label="Explore features">Explore</button>
        </section>
    </main>
    <script>
        // Improved performance with lazy loading and debouncing
        const lazyLoadImages = () => {
            const images = document.querySelectorAll('img[data-src]');
            const options = {
                root: null,
                rootMargin: '0px',
                threshold: 0.1
            };
            const loadImage = (image) => {
                image.src = image.dataset.src;
                image.onload = () => image.classList.add('fade-in');
            };
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        loadImage(entry.target);
                        observer.unobserve(entry.target);
                    }
                });
            }, options);
            images.forEach(image => observer.observe(image));
        };
        // Debounce example for input handling
        const handleInputChange = debounce((event) => {
            console.log('Input value:', event.target.value);
        }, 300);
        document.querySelector('input').addEventListener('input', handleInputChange);

        // Initialize lazy loading on document load
        document.addEventListener('DOMContentLoaded', lazyLoadImages);

        // Debounce function
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        };
    </script>
</body>
</html>
